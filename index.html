<html lang="zh-CN">
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>我的个人主页</title>
    </head>
    <body>
        <div class="container">
        <h1>我的待办事项</h1>
        <div class="input-area">
            <input type="text" id="todoInput" placeholder="输入要做的事...">
            <button id="addBtn">添加</button>
        </div>
        <ul id="todoList"></ul>
        </div>
        <script>
            const todoInput =document.getElementById('todoInput');
            const addBtn =document.getElementById('addBtn');
            const todoList =document.getElementById('todoList');
            let todos = [];
            function loadTodos(){
                fetch('http://localhost:3000/api/todos')
                .then(response=>response.json())
                .then(data=>{
                    todos=data;
                    render();
                    saveTodos();
                })
                .catch(error=>{
                    console.error('获取数据失败，使用本地数据:',error);
                    const stored = localStorage.getItem('mytodos');
                    if(stored){
                        todos=JSON.parse(stored);
                    }
                    render();
                });
                
            }
            function saveTodos(){
                localStorage.setItem('myTodos',JSON.stringify(todos));
            }
            function render(){
                todoList.innerHTML = '';
                todos.forEach((todo,index)=>{
                    const li =document.createElement("li");
                    if(todo.completed){
                        li.classList.add('completed');
                    }
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = todo.completed;
                    checkbox.addEventListener('change',()=>{
                        todo.completed = checkbox.checked;
                        saveTodos();
                        render();
                    })
                    const span = document.createElement('span');
                    span.textContent = todo.text;
                    const delBtn = document.createElement('button');
                    delBtn.textContent ='删除';
                    delBtn.style.marginLeft = 'auto';
                    delBtn.addEventListener('click',()=>{
                        const todoId=todo.id;
                        fetch(`http://localhost:3000/api/todos/${todoId}`,{
                            method:'DELETE'
                        })
                        .then(re=>res.json())
                        .then(()=>{
                            todos.splice(index,1);
                            saveTodos();
                            render();
                        })
                        .catch(err=>{
                            console.error('删除失败，仍在本地删除',err);
                        todos.splice(index,1);                       })
                        saveTodos();
                        render();
                    });
                    li.appendChild(checkbox);
                    li.appendChild(span);
                    li.appendChild(delBtn);
                    todoList.appendChild(li);
                } );
            }
            function addTodo(){
                const text = todoInput.value.trim();
                if (text==='' )return;
                const newTodo = {
                    text:text,
                    completed:false,
                    id:Date.now()
                };
                fetch('http://localhost:3000/api/todos',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify(newTodo)
                })
                .then(re=>res.json())
                .then(data=>{
                    newTodo.id=data.id;
                    todos.push(newTodo);
                    todoInput.value='';
                    saveTodos();
                    render();
                })
                .catch(err=>{
                    console.error('添加失败，仍保存到本地',err);
                    todos.push(newTodo);
                    todoInput.value='';
                    saveTodos();
                    render();
                });
            }
            addBtn.addEventListener('click',addTodo);
            todoInput.addEventListener('keypress',(e)=>{
                if(e.key==='Enter'){
                    addTodo();
                }
            });
            loadTodos();
        </script>
    </body>
</html>
