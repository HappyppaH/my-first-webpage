<html lang="zh-CN">
    <head>
       <meta charset="UTF-8">
       <title>彩色方块练习</title>
       <style>
        body{text-align: center;padding-top: 40px;}
        #boxContainer{display: flex;flex-wrap: wrap;gap: 12px;margin-top: 20px;padding: 0 40px;}
        .colorBox{
            width: 80px;height: 80px;border-radius: 8px;
            cursor: pointer;transition: transform 0.1s;
        }
        .colorBox:hover{transform: scale(1.05);}
       </style>
    </head>
    <body>
        <h2>点击按钮生成彩色方块，点击方块删除</h2>
        <button id="addBoxBtn">生成一个方块</button>
        <div id="boxContainer"></div>
        <script>
        const addBtn=document.getElementById('addBoxBtn');
        const container=document.getElementById('boxContainer');
        function randomColor(){
            const r =Math.floor(Math.random()*256);
            const g =Math.floor(Math.random()*256);
            const b =Math.floor(Math.random()*256);
            return `rgb(${r},${g},${b})`;
        }     
        function createBox(){
            const box = document.createElement('div');
            box.classList.add('colorBox');
            box.style.backgroundColor = randomColor();
            box
            .addEventListener('click',function(){
                box.remove();
            })
            container.appendChild(box);
        }
        addBtn.addEventListener('click',createBox);
        </script>
    </body>
</html>
