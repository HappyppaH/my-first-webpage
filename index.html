<html lang="zh-CN">
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>我的个人主页</title>
    </head>
    <body>
        <div class="container">
        <h1>我是高兴</h1>
        <p>我正在学习编程</p>
        <img src="images/1.png" alt="我的照片">
        <button id="byBtn">点击一下</button>
        <p id="output"></p>
        </div>
        <script>
            let button = document.getElementById("byBtn");
            let output = document.getElementById("output");
            let count = 0;
            function handleClick(){
                count = count +1;
                output.textContent = "你点击了"+count+"次！";
            }
            button.addEventListener("click",handleClick);
        </script>
    </body>
</html>
